services:
  pipeline-api:
    build: .
    ports:
      - "8100:8100"
    env_file:
      - .env
    volumes:
      - ./dataset:/app/dataset
      - ./logs:/app/logs
      - ./config:/app/config
    environment:
      - DATABASE_URL=sqlite:////app/pipeline.db
      - CORS_ORIGINS=http://localhost:5173

  dashboard:
    image: node:20-alpine
    working_dir: /app/dashboard
    volumes:
      - ./dashboard:/app/dashboard
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - pipeline-api
