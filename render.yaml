# Render Blueprint — E Stays API (Push 1 MVP)
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: estays-api
    runtime: node
    plan: starter
    buildCommand: >-
      npm run build:render
    startCommand: node apps/api/dist/index.js
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: estays-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 45m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: SETTLEMENT_DOCS_DIR
        value: /var/data/uploads/settlements
      - key: WEB_URL
        value: https://www.estayshotels.com
      - key: API_PUBLIC_URL
        value: https://estays-api.onrender.com
      - key: CORS_ORIGIN
        value: https://www.estayshotels.com
      - key: EMAIL_FROM
        value: noreply@estayshotels.com
      - key: BOOKINGS_EMAIL_FROM
        value: E Stays Bookings <bookings@estayshotels.com>
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
    disk:
      name: estays-uploads
      mountPath: /var/data/uploads
      sizeGB: 1

databases:
  - name: estays-db
    plan: starter
    databaseName: estays
    user: estays
