services:
  postgres:
    image: postgres:16-alpine
    container_name: estays-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: estays
      POSTGRES_PASSWORD: estays_secret
      POSTGRES_DB: estays
    volumes:
      - estays_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U estays -d estays"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: estays-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - estays_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: estays-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  estays_pg_data:
  estays_redis_data:
